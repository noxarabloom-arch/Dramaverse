# ─────────────────────────────────────────────────────────────────
# Netlify configuration for DramaVerse (TanStack Start + Nitro SSR)
# ─────────────────────────────────────────────────────────────────

[build]
  command   = "npm run build"
  publish   = ".output/public"

[build.environment]
  # @tanstack/react-start requires Node >=22.12.0 — do NOT set lower.
  NODE_VERSION = "22"
  NPM_FLAGS    = "--legacy-peer-deps"

# SSR: all non-static requests handled by the Nitro server function
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/server"
  status = 200

# ── Long-lived cache for hashed static assets ─────────────────────
[[headers]]
  for = "/_build/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Security headers ──────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
